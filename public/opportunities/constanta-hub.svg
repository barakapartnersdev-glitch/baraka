<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Constanta development site near the Black Sea port at golden hour">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1f3c"/>
      <stop offset="55%" stop-color="#163a66"/>
      <stop offset="100%" stop-color="#c8a04a"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8b25a"/>
      <stop offset="20%" stop-color="#3a5a86"/>
      <stop offset="100%" stop-color="#0f2b52"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16335c"/>
      <stop offset="100%" stop-color="#0a1f3c"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9b0"/>
      <stop offset="45%" stop-color="#f3c969"/>
      <stop offset="100%" stop-color="#f3c969" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="420" fill="url(#sky)"/>
  <!-- Sun glow -->
  <circle cx="820" cy="300" r="190" fill="url(#sun)"/>
  <circle cx="820" cy="300" r="74" fill="#ffe9b0" opacity="0.95"/>

  <!-- Digital-hub connectivity network -->
  <g stroke="#eef2f8" stroke-opacity="0.30" stroke-width="1.4" fill="none">
    <path d="M120 110 L360 200 L150 280 L420 300"/>
    <path d="M360 200 L600 130 L520 250 L760 190"/>
    <path d="M600 130 L1040 110 L980 250 L1090 200"/>
    <path d="M520 250 L420 300 L760 190 L980 250"/>
  </g>
  <g fill="#eef2f8" fill-opacity="0.7">
    <circle cx="120" cy="110" r="3"/><circle cx="360" cy="200" r="3"/>
    <circle cx="600" cy="130" r="3"/><circle cx="1040" cy="110" r="3"/>
    <circle cx="520" cy="250" r="3"/><circle cx="760" cy="190" r="3"/>
    <circle cx="980" cy="250" r="3"/><circle cx="420" cy="300" r="3"/>
    <circle cx="150" cy="280" r="3"/><circle cx="1090" cy="200" r="3"/>
  </g>

  <!-- Sea -->
  <rect y="420" width="1200" height="120" fill="url(#sea)"/>
  <!-- Sun reflection on water -->
  <g fill="#f3c969" opacity="0.55">
    <rect x="790" y="430" width="60" height="4" rx="2"/>
    <rect x="785" y="446" width="70" height="4" rx="2"/>
    <rect x="780" y="462" width="80" height="5" rx="2"/>
    <rect x="775" y="482" width="90" height="5" rx="2"/>
    <rect x="768" y="506" width="104" height="6" rx="3"/>
  </g>

  <!-- Distant port skyline / cranes -->
  <g fill="#0a1f3c" opacity="0.92">
    <!-- gantry crane 1 -->
    <path d="M120 420 V330 H250 V420 H236 V346 H134 V420 Z"/>
    <rect x="120" y="320" width="150" height="12"/>
    <path d="M270 320 L300 300 L300 320 Z"/>
    <!-- gantry crane 2 -->
    <path d="M300 420 V340 H430 V420 H416 V356 H314 V420 Z"/>
    <rect x="300" y="330" width="150" height="11"/>
    <path d="M450 330 L478 312 L478 330 Z"/>
    <!-- tower crane -->
    <rect x="520" y="250" width="8" height="170"/>
    <rect x="470" y="250" width="170" height="8"/>
    <path d="M470 258 L524 246 L640 258 Z" opacity="0.5"/>
    <rect x="610" y="258" width="6" height="34"/>
  </g>

  <!-- Cargo ship -->
  <g>
    <path d="M905 470 H1085 L1062 502 H928 Z" fill="#0a1f3c"/>
    <g fill="#163a66">
      <rect x="928" y="446" width="20" height="24"/>
      <rect x="952" y="450" width="20" height="20"/>
      <rect x="976" y="446" width="20" height="24"/>
      <rect x="1000" y="450" width="20" height="20"/>
      <rect x="1024" y="446" width="20" height="24"/>
    </g>
    <rect x="1048" y="432" width="22" height="38" fill="#0f2b52"/>
    <rect x="1054" y="440" width="4" height="6" fill="#f3c969"/>
    <rect x="1062" y="440" width="4" height="6" fill="#f3c969"/>
  </g>

  <!-- Foreground development land -->
  <path d="M0 540 L1200 540 L1200 675 L0 675 Z" fill="url(#land)"/>
  <path d="M0 540 C 220 520, 520 560, 760 536 C 980 514, 1100 552, 1200 540 L1200 560 L0 560 Z" fill="#0a1f3c"/>
  <!-- parcel grid (development plots) -->
  <g stroke="#c8a04a" stroke-opacity="0.55" stroke-width="2" fill="none">
    <path d="M150 600 L520 575 L600 640 L210 672 Z"/>
    <path d="M560 572 L900 556 L980 612 L640 636 Z"/>
    <path d="M520 575 L600 640" />
    <path d="M740 564 L820 624" stroke-opacity="0.4"/>
  </g>
  <!-- access road -->
  <path d="M0 672 L460 600 L1200 632 L1200 675 L0 675 Z" fill="#16335c"/>
  <g stroke="#eef2f8" stroke-opacity="0.5" stroke-width="3" stroke-dasharray="14 16">
    <path d="M40 668 L520 612 L1180 644"/>
  </g>
</svg>
